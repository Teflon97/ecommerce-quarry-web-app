{% extends 'base.html' %} {% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col">
            <h2>Reports</h2>
            <p class="text-muted">Generate and download reports</p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Orders Report</h5>
                    <p class="card-text">Export all orders to Excel</p>
                    <button class="btn btn-success">
                        <i class="bi bi-file-excel"></i> Export Orders
                    </button>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Employees Report</h5>
                    <p class="card-text">Export employee list to Excel</p>
                    <button class="btn btn-success">
                        <i class="bi bi-file-excel"></i> Export Employees
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
